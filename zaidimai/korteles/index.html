<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<title>Atminties žaidimas</title>

<style>
body{
margin:0;
background:#1e293b;
font-family:Arial;
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

h1{ margin:20px; }

#game{
display:grid;
grid-template-columns:repeat(4,100px);
gap:10px;
}

.card{
width:100px;
height:100px;
background:#334155;
display:flex;
align-items:center;
justify-content:center;
font-size:40px;
cursor:pointer;
border-radius:10px;
user-select:none;
}

.card.flipped{
background:#f8fafc;
color:black;
}

/* 🎉 LAIMĖJIMO KORTELĖ */
#winScreen{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
display:none;
align-items:center;
justify-content:center;
background:rgba(0,0,0,0.7);
}

#winCard{
background:white;
color:black;
padding:30px;
border-radius:15px;
text-align:center;
font-size:22px;
box-shadow:0 0 20px black;
}

button{
margin-top:15px;
padding:10px 20px;
border:none;
background:#22c55e;
color:white;
font-size:16px;
border-radius:8px;
cursor:pointer;
}
</style>
</head>

<body>

<a href="../../index.html" style="
  position: fixed;
  top: 16px;
  left: 16px;
  background: rgba(0,0,0,0.6);
  color: white;
  padding: 8px 16px;
  border-radius: 8px;
  text-decoration: none;
  font-family: sans-serif;
  font-size: 14px;
  z-index:9999;
">← Grįžti</a>

<h1>🧠 Atminties žaidimas</h1>
<div id="game"></div>

<!-- 🎉 WIN OVERLAY -->
<div id="winScreen">
    <div id="winCard">
        🎉 Tu laimėjai!
        <br>
        <button onclick="restart()">Žaisti dar kartą</button>
    </div>
</div>

<script>

const symbols=[
"🍎","🍌","🍇","🍒",
"🍉","🍑","🍍","🥝"
];

let cards=[...symbols,...symbols];
cards.sort(()=>0.5-Math.random());

const game=document.getElementById("game");
const winScreen=document.getElementById("winScreen");

let first=null;
let second=null;
let lock=false;
let matched=0;

/* kortos */
cards.forEach(symbol=>{

const div=document.createElement("div");
div.classList.add("card");
div.dataset.symbol=symbol;
div.innerText="❓";

div.addEventListener("click",()=>flip(div));

game.appendChild(div);

});

/* flip */
function flip(card){

if(lock || card.classList.contains("flipped")) return;

card.classList.add("flipped");
card.innerText=card.dataset.symbol;

if(!first){
first=card;
return;
}

second=card;
lock=true;

if(first.dataset.symbol===second.dataset.symbol){

matched++;

first=null;
second=null;
lock=false;

/* 🏆 LAIMĖJIMAS */
if(matched===symbols.length){
setTimeout(()=>{
winScreen.style.display="flex";
},300);
}

}else{

setTimeout(()=>{

first.classList.remove("flipped");
second.classList.remove("flipped");

first.innerText="❓";
second.innerText="❓";

first=null;
second=null;
lock=false;

},700);
}

}

/* restart */
function restart(){

winScreen.style.display="none";

/* reset game state */
game.innerHTML="";

first=null;
second=null;
lock=false;
matched=0;

/* perkurti kortas */
cards=[...symbols,...symbols];
cards.sort(()=>0.5-Math.random());

cards.forEach(symbol=>{

const div=document.createElement("div");
div.classList.add("card");
div.dataset.symbol=symbol;
div.innerText="❓";

div.addEventListener("click",()=>flip(div));

game.appendChild(div);

});
}
</script>

</body>
</html>
