<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tetris</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #000;
    color: #fff;
    font-family: 'Orbitron', monospace;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 1rem;
    overflow: hidden;
  }

  /* Animated grid background */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    animation: gridMove 20s linear infinite;
    pointer-events: none;
    z-index: 0;
  }

  @keyframes gridMove {
    0% { background-position: 0 0; }
    100% { background-position: 40px 40px; }
  }

  /* Glow effects */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 50%, rgba(0,255,255,0.05) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 50%, rgba(255,0,255,0.05) 0%, transparent 50%);
    pointer-events: none;
    z-index: 0;
  }

  a.back-btn {
    position: fixed;
    top: 16px; left: 16px;
    background: rgba(0,255,255,0.1);
    color: #0ff;
    padding: 8px 16px;
    border-radius: 4px;
    text-decoration: none;
    font-size: 11px;
    letter-spacing: 2px;
    border: 1px solid rgba(0,255,255,0.3);
    text-transform: uppercase;
    transition: all 0.2s;
    z-index: 100;
  }
  a.back-btn:hover {
    background: rgba(0,255,255,0.2);
    box-shadow: 0 0 20px rgba(0,255,255,0.3);
  }

  h1 {
    font-size: 2.5rem;
    font-weight: 900;
    margin-bottom: 1.5rem;
    letter-spacing: 8px;
    text-transform: uppercase;
    color: #0ff;
    text-shadow:
      0 0 10px #0ff,
      0 0 20px #0ff,
      0 0 40px #0ff;
    position: relative;
    z-index: 1;
    animation: flicker 4s infinite;
  }

  @keyframes flicker {
    0%,95%,97%,100% { opacity: 1; }
    96% { opacity: 0.8; }
  }

  .game-wrap {
    display: flex;
    gap: 2rem;
    align-items: flex-start;
    position: relative;
    z-index: 1;
  }

  .canvas-wrap {
    position: relative;
  }

  canvas#board {
    display: block;
    border: 1px solid #0ff;
    box-shadow:
      0 0 10px #0ff,
      0 0 20px rgba(0,255,255,0.3),
      inset 0 0 30px rgba(0,255,255,0.05);
  }

  .side {
    display: flex;
    flex-direction: column;
    gap: 1rem;
    min-width: 130px;
  }

  .panel {
    background: rgba(0,0,0,0.8);
    border: 1px solid rgba(0,255,255,0.3);
    padding: 0.9rem 1rem;
    position: relative;
    clip-path: polygon(0 0, calc(100% - 10px) 0, 100% 10px, 100% 100%, 0 100%);
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; right: 0;
    width: 10px; height: 10px;
    background: #0ff;
  }

  .panel h3 {
    font-size: 0.6rem;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(0,255,255,0.5);
    margin-bottom: 0.4rem;
  }

  .panel .val {
    font-size: 1.6rem;
    font-weight: 700;
    color: #0ff;
    text-shadow: 0 0 10px #0ff;
  }

  #nextCanvas {
    display: block;
    margin-top: 0.5rem;
  }

  .btn {
    background: transparent;
    color: #0ff;
    border: 1px solid #0ff;
    padding: 10px 16px;
    font-family: 'Orbitron', monospace;
    font-size: 0.7rem;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    cursor: pointer;
    width: 100%;
    transition: all 0.2s;
    clip-path: polygon(0 0, calc(100% - 8px) 0, 100% 8px, 100% 100%, 0 100%);
  }
  .btn:hover {
    background: rgba(0,255,255,0.1);
    box-shadow: 0 0 20px rgba(0,255,255,0.4);
  }

  .controls {
    font-size: 0.6rem;
    color: rgba(0,255,255,0.4);
    line-height: 2;
    letter-spacing: 1px;
  }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(0,0,0,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    border: 1px solid rgba(0,255,255,0.3);
  }

  .overlay h2 {
    font-size: 1.2rem;
    font-weight: 900;
    color: #0ff;
    letter-spacing: 4px;
    text-shadow: 0 0 20px #0ff;
    text-transform: uppercase;
  }

  .overlay p {
    color: rgba(0,255,255,0.6);
    font-size: 0.7rem;
    letter-spacing: 2px;
  }

  .overlay .btn {
    width: auto;
    padding: 12px 28px;
  }

  /* Scanlines */
  .scanlines {
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.1) 2px,
      rgba(0,0,0,0.1) 4px
    );
    pointer-events: none;
    z-index: 2;
  }

  .mobile-btns {
    display: none;
    gap: 0.5rem;
    margin-top: 1rem;
    flex-wrap: wrap;
    justify-content: center;
    position: relative;
    z-index: 1;
  }

  .mob-btn {
    background: transparent;
    border: 1px solid rgba(0,255,255,0.4);
    color: #0ff;
    border-radius: 4px;
    padding: 14px 22px;
    font-size: 1.2rem;
    cursor: pointer;
    touch-action: manipulation;
    transition: all 0.1s;
  }
  .mob-btn:active {
    background: rgba(0,255,255,0.2);
    box-shadow: 0 0 15px rgba(0,255,255,0.5);
  }

  @media (max-width: 600px) {
    .game-wrap { flex-direction: column; align-items: center; }
    .side { flex-direction: row; flex-wrap: wrap; min-width: unset; }
    .mobile-btns { display: flex; }
    h1 { font-size: 1.4rem; letter-spacing: 4px; }
  }
</style>
</head>
<body>

<a class="back-btn" href="../../index.html">← Grįžti</a>

<h1>Tetris</h1>

<div class="game-wrap">
  <div class="canvas-wrap">
    <canvas id="board" width="300" height="600"></canvas>
    <div class="scanlines"></div>
    <div class="overlay" id="overlay">
      <h2>Tetris</h2>
      <p>Paspausk pradėti</p>
      <button class="btn" onclick="startGame()">▶ Pradėti</button>
    </div>
  </div>

  <div class="side">
    <div class="panel">
      <h3>Taškai</h3>
      <div class="val" id="score">0</div>
    </div>
    <div class="panel">
      <h3>Lygis</h3>
      <div class="val" id="level">1</div>
    </div>
    <div class="panel">
      <h3>Eilutės</h3>
      <div class="val" id="lines">0</div>
    </div>
    <div class="panel">
      <h3>Kitas</h3>
      <canvas id="nextCanvas" width="110" height="90"></canvas>
    </div>
    <button class="btn" onclick="startGame()">↺ Iš naujo</button>
    <div class="controls">
      ← → JUDĖTI<br>
      ↑ SUKTI<br>
      ↓ GREIČIAU<br>
      SPACE KRITIMAS
    </div>
  </div>
</div>

<div class="mobile-btns">
  <button class="mob-btn" onclick="move(-1)">◀</button>
  <button class="mob-btn" onclick="rotate()">↺</button>
  <button class="mob-btn" onclick="move(1)">▶</button>
  <button class="mob-btn" onclick="drop()">▼</button>
</div>

<script>
const COLS = 10, ROWS = 20, BLOCK = 30;
const canvas = document.getElementById('board');
const ctx = canvas.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nctx = nextCanvas.getContext('2d');

// Cyberpunk neon colors
const COLORS = ['',
  '#ff2d55', // red-pink
  '#ff9f0a', // orange
  '#ffd60a', // yellow
  '#32d74b', // green
  '#0af',    // cyan
  '#bf5af2', // purple
  '#ff375f', // pink
];

const GLOWS = ['',
  'rgba(255,45,85,0.6)',
  'rgba(255,159,10,0.6)',
  'rgba(255,214,10,0.6)',
  'rgba(50,215,75,0.6)',
  'rgba(0,170,255,0.6)',
  'rgba(191,90,242,0.6)',
  'rgba(255,55,95,0.6)',
];

const PIECES = [
  null,
  [[1,1,1,1]],
  [[2,0],[2,0],[2,2]],
  [[0,3],[0,3],[3,3]],
  [[4,4],[4,4]],
  [[0,5,5],[5,5,0]],
  [[6,6,0],[0,6,6]],
  [[0,7,0],[7,7,7]],
];

let board, piece, next, score, level, lines, running;

function emptyBoard() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function randPiece() {
  const idx = Math.floor(Math.random() * (PIECES.length - 1)) + 1;
  const shape = PIECES[idx].map(r => [...r]);
  return { shape, x: Math.floor(COLS/2) - Math.ceil(shape[0].length/2), y: 0, color: idx };
}

function drawBlock(c, x, y, color, size=BLOCK, alpha=1) {
  const col = COLORS[color];
  const glow = GLOWS[color];

  // Glow
  c.shadowBlur = 15;
  c.shadowColor = glow;

  // Fill
  c.globalAlpha = alpha;
  c.fillStyle = col;
  c.fillRect(x*size+1, y*size+1, size-2, size-2);

  // Inner darker
  c.fillStyle = 'rgba(0,0,0,0.3)';
  c.fillRect(x*size+4, y*size+4, size-8, size-8);

  // Top highlight
  c.fillStyle = 'rgba(255,255,255,0.3)';
  c.fillRect(x*size+1, y*size+1, size-2, 3);

  // Border glow
  c.strokeStyle = col;
  c.lineWidth = 1;
  c.strokeRect(x*size+1, y*size+1, size-2, size-2);

  c.shadowBlur = 0;
  c.globalAlpha = 1;
}

function drawBoard() {
  // Background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Grid lines
  ctx.strokeStyle = 'rgba(0,255,255,0.04)';
  ctx.lineWidth = 1;
  for (let r=0; r<ROWS; r++) for (let c=0; c<COLS; c++) {
    ctx.strokeRect(c*BLOCK, r*BLOCK, BLOCK, BLOCK);
  }

  // Board blocks
  for (let r=0; r<ROWS; r++)
    for (let c=0; c<COLS; c++)
      if (board[r][c]) drawBlock(ctx, c, r, board[r][c]);

  if (!piece) return;

  // Ghost
  let ghost = { ...piece, shape: piece.shape.map(r=>[...r]) };
  while (valid(ghost, 0, 1)) ghost.y++;
  ghost.shape.forEach((row, r) => row.forEach((v, c) => {
    if (v) {
      ctx.strokeStyle = COLORS[piece.color];
      ctx.lineWidth = 1;
      ctx.globalAlpha = 0.2;
      ctx.strokeRect((ghost.x+c)*BLOCK+1, (ghost.y+r)*BLOCK+1, BLOCK-2, BLOCK-2);
      ctx.globalAlpha = 1;
    }
  }));

  // Current piece
  piece.shape.forEach((row, r) => row.forEach((v, c) => {
    if (v) drawBlock(ctx, piece.x+c, piece.y+r, piece.color);
  }));
}

function drawNext() {
  nctx.fillStyle = '#000';
  nctx.fillRect(0,0,110,90);
  if (!next) return;
  const size = 22;
  const ox = Math.floor((5 - next.shape[0].length) / 2);
  const oy = Math.floor((5 - next.shape.length) / 2);
  next.shape.forEach((row, r) => row.forEach((v, c) => {
    if (v) {
      nctx.shadowBlur = 10;
      nctx.shadowColor = GLOWS[next.color];
      nctx.fillStyle = COLORS[next.color];
      nctx.fillRect((ox+c)*size+1, (oy+r)*size+1, size-2, size-2);
      nctx.shadowBlur = 0;
    }
  }));
}

function valid(p, dx=0, dy=0, shape=null) {
  const s = shape || p.shape;
  return s.every((row, r) => row.every((v, c) => {
    if (!v) return true;
    const nx = p.x+c+dx, ny = p.y+r+dy;
    return nx>=0 && nx<COLS && ny<ROWS && (ny<0 || !board[ny][nx]);
  }));
}

function place() {
  piece.shape.forEach((row, r) => row.forEach((v, c) => {
    if (v && piece.y+r >= 0) board[piece.y+r][piece.x+c] = piece.color;
  }));
  clearLines();
  piece = next;
  next = randPiece();
  drawNext();
  if (!valid(piece)) endGame();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS-1; r >= 0; r--) {
    if (board[r].every(v => v)) {
      board.splice(r, 1);
      board.unshift(Array(COLS).fill(0));
      cleared++; r++;
    }
  }
  if (cleared) {
    const pts = [0,100,300,500,800][cleared] * level;
    score += pts;
    lines += cleared;
    level = Math.floor(lines/10) + 1;
    document.getElementById('score').textContent = score;
    document.getElementById('level').textContent = level;
    document.getElementById('lines').textContent = lines;
  }
}

function move(dx) { if (running && valid(piece, dx, 0)) piece.x += dx; }
function rotate() {
  if (!running) return;
  const rot = piece.shape[0].map((_, i) => piece.shape.map(r => r[i]).reverse());
  if (valid(piece, 0, 0, rot)) piece.shape = rot;
  else if (valid(piece, 1, 0, rot)) { piece.shape = rot; piece.x++; }
  else if (valid(piece, -1, 0, rot)) { piece.shape = rot; piece.x--; }
}
function drop() {
  if (!running) return;
  while (valid(piece, 0, 1)) piece.y++;
  place();
}

function tick() {
  if (!running) return;
  if (valid(piece, 0, 1)) piece.y++;
  else place();
  drawBoard();
}

function startGame() {
  board = emptyBoard();
  score = 0; level = 1; lines = 0; running = true;
  document.getElementById('score').textContent = 0;
  document.getElementById('level').textContent = 1;
  document.getElementById('lines').textContent = 0;
  document.getElementById('overlay').style.display = 'none';
  piece = randPiece();
  next = randPiece();
  drawNext();

  function loop() {
    if (!running) return;
    tick();
    setTimeout(loop, Math.max(80, 550 - (level-1)*50));
  }
  loop();
}

function endGame() {
  running = false;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h2>Game Over</h2>
    <p style="color:rgba(0,255,255,0.6);font-size:0.65rem;letter-spacing:2px">TAŠKAI: <span style="color:#0ff">${score}</span></p>
    <p style="color:rgba(0,255,255,0.6);font-size:0.65rem;letter-spacing:2px">LYGIS: <span style="color:#0ff">${level}</span></p>
    <button class="btn" onclick="startGame()">↺ Dar kartą</button>
  `;
  ov.style.display = 'flex';
  drawBoard();
}

document.addEventListener('keydown', e => {
  if (!running) return;
  if (e.key==='ArrowLeft')  { move(-1); drawBoard(); }
  if (e.key==='ArrowRight') { move(1);  drawBoard(); }
  if (e.key==='ArrowUp')    { rotate(); drawBoard(); }
  if (e.key==='ArrowDown')  { if(valid(piece,0,1)) piece.y++; drawBoard(); }
  if (e.key===' ')          { e.preventDefault(); drop(); drawBoard(); }
});

let tx=0, ty=0;
canvas.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; ty=e.touches[0].clientY; }, {passive:true});
canvas.addEventListener('touchend', e=>{
  const dx=e.changedTouches[0].clientX-tx, dy=e.changedTouches[0].clientY-ty;
  if (Math.abs(dx)>Math.abs(dy)) { move(dx>0?1:-1); }
  else if (dy>30) { drop(); }
  else { rotate(); }
  drawBoard();
}, {passive:true});

drawBoard();
</script>
</body>
</html>
