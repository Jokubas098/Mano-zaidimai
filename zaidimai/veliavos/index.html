<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jokūbo vėliavų žaidimas 🌍</title>
<style>
:root{--g1:#1a1a2e;--g2:#16213e;--g3:#0f3460;--acc:#4299e1;--acc2:#667eea;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Segoe UI',sans-serif;background:linear-gradient(135deg,var(--g1),var(--g2),var(--g3));min-height:100vh;display:flex;align-items:flex-start;justify-content:center;color:#fff;padding:16px 0 40px;}
.container{width:100%;max-width:580px;padding:0 16px;}

/* TITLE */
h1{text-align:center;font-size:1.6rem;margin-bottom:18px;letter-spacing:.5px;}

/* SETTINGS TOGGLE BUTTON */
.btn-settings-toggle{width:100%;background:rgba(255,255,255,0.07);border:1.5px solid rgba(255,255,255,0.15);border-radius:12px;padding:9px 16px;color:#a0aec0;font-size:0.85rem;font-weight:600;cursor:pointer;margin-bottom:8px;text-align:left;transition:all .15s;display:flex;align-items:center;justify-content:space-between;}
.btn-settings-toggle:hover{background:rgba(255,255,255,0.12);color:#fff;}
.btn-settings-toggle .arrow{transition:transform .2s;}
.btn-settings-toggle.open .arrow{transform:rotate(180deg);}

/* SETTINGS PANEL */
.settings{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);border-radius:16px;padding:14px 16px;margin-bottom:14px;display:flex;flex-direction:column;gap:10px;overflow:hidden;max-height:0;padding:0 16px;border-width:0;transition:max-height .3s ease,padding .3s ease,border-width .2s;}
.settings.open{max-height:400px;padding:14px 16px;border-width:1px;}
.setting-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.setting-label{font-size:0.75rem;color:#a0aec0;font-weight:600;white-space:nowrap;min-width:60px;}
.pills{display:flex;gap:5px;flex-wrap:wrap;}
.pill{border:1.5px solid rgba(255,255,255,0.18);background:rgba(255,255,255,0.07);border-radius:99px;padding:4px 12px;color:#a0aec0;font-size:0.78rem;cursor:pointer;font-weight:600;transition:all .15s;white-space:nowrap;}
.pill:hover,.pill.on{border-color:var(--acc);color:#fff;background:rgba(66,153,225,0.22);}
.pill.danger.on{border-color:#fc8181;background:rgba(252,129,129,.2);color:#fed7d7;}

/* COLOR SWATCHES */
.swatches{display:flex;gap:7px;align-items:center;margin-left:auto;}
.sw{width:20px;height:20px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:transform .15s,border-color .15s;}
.sw:hover{transform:scale(1.2);}
.sw.on{border-color:#fff;transform:scale(1.15);}
.sw-blue{background:radial-gradient(circle,#4299e1,#0f3460);}
.sw-green{background:radial-gradient(circle,#48bb78,#1a4731);}
.sw-purple{background:radial-gradient(circle,#9f7aea,#3b1f6e);}
.sw-red{background:radial-gradient(circle,#fc8181,#742a2a);}
.sw-orange{background:radial-gradient(circle,#f6ad55,#7b341e);}
.sw-dark{background:radial-gradient(circle,#718096,#1a202c);}

/* SCORE BAR */
.scorebar{display:flex;justify-content:space-between;align-items:center;background:rgba(255,255,255,0.08);border-radius:12px;padding:9px 16px;margin-bottom:10px;font-size:0.85rem;gap:8px;flex-wrap:wrap;}
.sc-pts{font-size:1.05rem;font-weight:700;color:#68d391;}
.sc-streak{color:#f6ad55;font-weight:700;}
.hearts{display:flex;gap:4px;font-size:1.1rem;}

/* TIMER BAR */
.timer-wrap{height:6px;background:rgba(255,255,255,0.1);border-radius:99px;margin-bottom:10px;overflow:hidden;position:relative;}
.timer-bar{height:100%;border-radius:99px;transition:width .1s linear,background .3s;background:var(--acc);}
.timer-num{text-align:center;font-size:0.8rem;color:#a0aec0;margin-top:2px;margin-bottom:8px;min-height:16px;}

/* PROGRESS */
.prog-wrap{background:rgba(255,255,255,0.1);border-radius:99px;height:5px;margin-bottom:14px;overflow:hidden;}
.prog-bar{height:100%;background:linear-gradient(90deg,var(--acc),#68d391);border-radius:99px;transition:width .4s ease;}

/* FLAG CARD */
.flag-card{background:rgba(255,255,255,0.07);border:2px solid rgba(255,255,255,0.1);border-radius:20px;padding:8px;text-align:center;margin-bottom:14px;transition:border-color .3s,background .3s;}
.flag-card.ok{border-color:#68d391;background:rgba(104,211,145,.12);}
.flag-card.bad{border-color:#fc8181;background:rgba(252,129,129,.10);}
@keyframes bnc{0%,100%{transform:scale(1)}50%{transform:scale(1.12)}}

/* HINTS */
.hints-row{display:flex;gap:7px;flex-wrap:wrap;margin-bottom:10px;align-items:center;}
.btn-hint{background:rgba(246,173,85,.12);border:1.5px solid rgba(246,173,85,.35);border-radius:99px;padding:5px 13px;color:#f6ad55;font-size:0.78rem;font-weight:600;cursor:pointer;transition:all .15s;white-space:nowrap;}
.btn-hint:hover:not(:disabled){background:rgba(246,173,85,.22);}
.btn-hint:disabled{opacity:.3;cursor:default;}
.hint-text{width:100%;font-size:0.85rem;color:#fbd38d;min-height:18px;font-weight:500;line-height:1.5;}
.hint-letters{font-family:monospace;font-size:1rem;letter-spacing:3px;color:#f6ad55;font-weight:700;}

/* INPUT */
.input-wrap{display:flex;gap:8px;margin-bottom:12px;}
.ans-inp{flex:1;background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,.2);border-radius:14px;padding:12px 15px;color:#fff;font-size:.95rem;outline:none;transition:border-color .2s,background .2s;}
.ans-inp::placeholder{color:rgba(255,255,255,.33);}
.ans-inp:focus{border-color:var(--acc);background:rgba(255,255,255,.12);}
.ans-inp.ok{border-color:#68d391;background:rgba(104,211,145,.15);color:#c6f6d5;}
.ans-inp.bad{border-color:#fc8181;background:rgba(252,129,129,.12);color:#fed7d7;}
.ans-inp:disabled{cursor:default;}

/* CHOICES 6 */
.choices{display:grid;grid-template-columns:1fr 1fr 1fr;gap:7px;margin-bottom:12px;
  animation:fadeIn .22s ease;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
.btn-ch{background:rgba(255,255,255,0.08);border:2px solid rgba(255,255,255,.14);border-radius:12px;padding:11px 7px;color:#e2e8f0;font-size:.82rem;font-weight:500;cursor:pointer;transition:all .16s;text-align:center;line-height:1.3;}
.btn-ch:hover:not(:disabled){background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.3);transform:translateY(-2px);}
.btn-ch.ok{background:rgba(104,211,145,.25);border-color:#68d391;color:#c6f6d5;}
.btn-ch.bad{background:rgba(252,129,129,.2);border-color:#fc8181;color:#fed7d7;}
.btn-ch:disabled{cursor:default;transform:none;}

/* FLAG */
.flag-emoji{display:block;width:100%;}
.flag-emoji.bounce{animation:bnc .4s ease;}
.flag-main-wrap{width:100%;aspect-ratio:16/10;border-radius:10px;overflow:hidden;box-shadow:0 6px 20px rgba(0,0,0,.5);}
.flag-main-wrap svg,.flag-main-wrap img{width:100%;height:100%;display:block;}
.flag-main-img{width:100%;aspect-ratio:16/10;object-fit:contain;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.5);display:block;}
#fc{display:none!important;position:absolute;width:0;height:0;overflow:hidden;}

/* SUBMIT */
.btn-sub{background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:14px;padding:12px 18px;color:#fff;font-size:.9rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;white-space:nowrap;}
.btn-sub:hover:not(:disabled){opacity:.88;transform:translateY(-1px);}
.btn-sub:disabled{opacity:.35;cursor:default;transform:none;}

/* FEEDBACK */
.feedback{text-align:center;font-size:.92rem;min-height:24px;margin-bottom:12px;font-weight:600;}
.feedback.ok{color:#68d391;}
.feedback.bad{color:#fc8181;}

/* NEXT */
.btn-next{width:100%;background:linear-gradient(135deg,var(--acc),var(--acc2));border:none;border-radius:14px;padding:13px;color:#fff;font-size:.92rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .15s;display:none;}
.btn-next:hover{opacity:.9;transform:translateY(-1px);}
.btn-next.show{display:block;}

/* END SCREEN */
.end-screen{display:none;text-align:center;padding:20px;background:rgba(255,255,255,.07);border-radius:20px;border:1px solid rgba(255,255,255,.15);}
.end-screen .big-em{font-size:4rem;margin-bottom:8px;}
.end-screen h2{font-size:1.6rem;margin-bottom:6px;}
.end-screen .fin-score{font-size:2.6rem;font-weight:900;color:#68d391;margin:8px 0;}
.end-screen .rating{font-size:.95rem;color:#f6ad55;margin-bottom:10px;}
.best-score-line{font-size:.82rem;color:#a0aec0;margin-bottom:16px;}
.btn-restart{background:linear-gradient(135deg,#f6ad55,#ed8936);border:none;border-radius:14px;padding:12px 32px;color:#1a202c;font-size:.92rem;font-weight:800;cursor:pointer;transition:opacity .2s,transform .15s;}
.btn-restart:hover{opacity:.9;transform:translateY(-1px);}

/* ERROR REVIEW */
.err-review{margin-top:18px;text-align:left;}
.err-review h3{font-size:.95rem;color:#fc8181;margin-bottom:10px;text-align:center;}
.err-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:8px;}
.err-item{background:rgba(252,129,129,.1);border:1px solid rgba(252,129,129,.3);border-radius:12px;padding:10px 8px;text-align:center;font-size:.8rem;}
.err-item .ef{display:flex;align-items:center;justify-content:center;height:50px;margin-bottom:4px;}
.err-item .en{color:#fed7d7;font-weight:600;line-height:1.2;}
.err-item .ec{color:#a0aec0;font-size:.72rem;margin-top:2px;}

/* BROWSE MODE */
.browse-screen{display:none;}
.browse-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(130px,1fr));gap:10px;margin-top:12px;}
.browse-card{background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.12);border-radius:14px;padding:14px 10px;text-align:center;cursor:default;transition:background .2s;}
.browse-card:hover{background:rgba(255,255,255,.12);}
.browse-card .bf{display:flex;align-items:center;justify-content:center;height:56px;margin-bottom:6px;}
.browse-card .bn{font-weight:700;font-size:.82rem;color:#e2e8f0;margin-bottom:2px;}
.browse-card .bc{font-size:.7rem;color:#a0aec0;}
.browse-card .bk{font-size:.7rem;color:#fbd38d;}
.browse-back{margin-bottom:12px;background:rgba(255,255,255,.08);border:1.5px solid rgba(255,255,255,.2);border-radius:99px;padding:6px 16px;color:#e2e8f0;font-size:.82rem;font-weight:600;cursor:pointer;transition:all .15s;}
.browse-back:hover{background:rgba(255,255,255,.15);}
.browse-filter{display:flex;gap:6px;flex-wrap:wrap;margin-bottom:12px;}

/* BEST SCORES TABLE */
.scores-table{margin-top:6px;font-size:.78rem;color:#a0aec0;}
.scores-table th{color:#e2e8f0;padding:3px 8px;}
.scores-table td{padding:3px 8px;}
.scores-table tr:nth-child(even){background:rgba(255,255,255,.04);}

.hidden{display:none!important;}

/* FLAG ICONS EMBEDDED */
.flag-big{display:block;width:70%;max-width:340px;aspect-ratio:16/10;margin:0 auto;border-radius:10px;box-shadow:0 6px 20px rgba(0,0,0,.5);background-size:contain;background-position:center;background-repeat:no-repeat;}
