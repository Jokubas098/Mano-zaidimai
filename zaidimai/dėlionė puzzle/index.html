<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🎯 Atspėk skaičių</title>

<style>
*{
    box-sizing:border-box;
    margin:0;
    padding:0;
    font-family:Arial;
}

body{
    background:linear-gradient(135deg,#4facfe,#00f2fe);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    transition:0.3s;
}

.dark{
    background:#111 !important;
    color:white;
}

.container{
    width:420px;
    background:white;
    padding:20px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 10px 25px rgba(0,0,0,0.3);
}

.dark .container{
    background:#222;
    color:white;
}

h1{
    color:#0077ff;
    margin-bottom:10px;
}

input,select,button{
    width:100%;
    padding:10px;
    margin:5px 0;
    border-radius:10px;
    border:1px solid #ccc;
}

button{
    background:#0077ff;
    color:white;
    border:none;
    font-weight:bold;
    cursor:pointer;
}

button:hover{
    background:#0055cc;
}

#rezultatas{
    font-size:20px;
    font-weight:bold;
    margin-top:10px;
}

#hint{
    font-style:italic;
    margin-top:5px;
    color:#555;
}

.settings{
    display:none;
    margin-top:10px;
    border-top:2px solid #ddd;
    padding-top:10px;
}

hr{
    margin:10px 0;
}
</style>
</head>

<body>

<div class="container">

<h1>🎯 Atspėk skaičių</h1>

<p id="rangeText">Skaičius nuo 1 iki 100</p>
<p>🏆 Rekordas: <span id="record">-</span></p>

<hr>

<input type="number" id="guess" placeholder="Įvesk skaičių">
<button onclick="checkGuess()">Spėti</button>

<label>
<input type="checkbox" id="hints" checked>
💡 Užuominos
</label>

<p id="rezultatas"></p>
<p id="hint"></p>

<hr>

<button onclick="toggleSettings()">⚙️ Nustatymai</button>

<div class="settings" id="settings">

<label>⭐ Sunkumas</label>
<select id="difficulty">
<option value="100">Lengvas</option>
<option value="500">Normalus</option>
<option value="1000">Sunkus</option>
</select>

<label>🎨 Fono spalva</label>
<input type="color" id="bgColor" value="#4facfe">

<label>
<input type="checkbox" id="darkMode">
🌙 Tamsus režimas
</label>

<button onclick="applySettings()">Išsaugoti</button>

</div>

</div>

<script>

let maxNumber = 100;
let secretNumber;
let attempts = 0;

startGame();
loadRecord();

function startGame(){
    secretNumber = Math.floor(Math.random()*maxNumber)+1;
    attempts = 0;
}

function toggleSettings(){
    const s = document.getElementById("settings");
    s.style.display = s.style.display === "block" ? "none" : "block";
}

function applySettings(){

    maxNumber = Number(document.getElementById("difficulty").value);

    document.getElementById("rangeText").textContent =
    "Skaičius nuo 1 iki " + maxNumber;

    document.body.style.background =
    document.getElementById("bgColor").value;

    document.body.classList.toggle(
        "dark",
        document.getElementById("darkMode").checked
    );

    startGame();

    document.getElementById("rezultatas").textContent =
    "✅ Naujas žaidimas pradėtas!";
}

function randomHint(){

    const tens = Math.floor(secretNumber / 10);
    const ones = secretNumber % 10;

    const hints = [
        `💡 Dešimčių skaitmuo: ${tens}`,
        `💡 Vienetų skaitmuo: ${ones}`,
        secretNumber % 2 === 0
            ? "💡 Skaičius lyginis"
            : "💡 Skaičius nelyginis",
        secretNumber > maxNumber/2
            ? "💡 Virš vidurio"
            : "💡 Žemiau vidurio"
    ];

    return hints[Math.floor(Math.random()*hints.length)];
}

function showHint(){
    const box = document.getElementById("hint");
    const enabled = document.getElementById("hints").checked;

    box.textContent = enabled ? randomHint() : "";
}

function checkGuess(){

    const guess = Number(document.getElementById("guess").value);
    const result = document.getElementById("rezultatas");

    if(!guess){
        result.textContent = "❗ Įvesk skaičių";
        result.style.color = "red";
        return;
    }

    attempts++;

    if(guess < secretNumber){
        result.textContent = "🔻 Per mažas!";
        result.style.color = "orange";
        showHint();
    }
    else if(guess > secretNumber){
        result.textContent = "🔺 Per didelis!";
        result.style.color = "red";
        showHint();
    }
    else{
        result.textContent = `🎉 Teisingai! Per ${attempts} bandymų!`;
        result.style.color = "green";

        updateRecord();
        startGame();

        document.getElementById("hint").textContent = "";
    }

    // išvalo input
    document.getElementById("guess").value = "";
    document.getElementById("guess").focus();
}

function loadRecord(){
    const r = localStorage.getItem("record");
    if(r) document.getElementById("record").textContent = r;
}

function updateRecord(){
    const old = localStorage.getItem("record");

    if(!old || attempts < old){
        localStorage.setItem("record", attempts);
        document.getElementById("record").textContent = attempts;
        alert("🏆 Naujas rekordas!");
    }
}

// Enter palaikymas
document.getElementById("guess")
.addEventListener("keydown", e=>{
    if(e.key === "Enter") checkGuess();
});

</script>

</body>
</html>
