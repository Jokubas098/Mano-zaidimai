<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platformer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #87CEEB;
    font-family: 'Quicksand', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Clouds */
  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.8;
    pointer-events: none;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .c1 { width:120px; height:40px; top:8%; left:-10%; animation: cloudMove 20s linear infinite; }
  .c1::before { width:60px; height:60px; top:-30px; left:15px; }
  .c1::after  { width:40px; height:40px; top:-20px; left:55px; }
  .c2 { width:80px; height:30px; top:20%; left:-5%; animation: cloudMove 28s linear infinite 5s; }
  .c2::before { width:40px; height:40px; top:-20px; left:10px; }
  .c2::after  { width:30px; height:30px; top:-15px; left:38px; }
  .c3 { width:100px; height:35px; top:5%; left:-8%; animation: cloudMove 24s linear infinite 12s; }
  .c3::before { width:50px; height:50px; top:-25px; left:12px; }
  .c3::after  { width:35px; height:35px; top:-18px; left:48px; }

  @keyframes cloudMove {
    from { left: -150px; }
    to   { left: 110%; }
  }

  a.back-btn {
    position: fixed;
    top: 14px; left: 14px;
    background: #fff;
    color: #4a90d9;
    padding: 7px 14px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    z-index: 100;
    transition: all 0.2s;
  }
  a.back-btn:hover { background: #4a90d9; color: #fff; }

  h1 {
    font-size: 2rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 3px 0 rgba(0,0,0,0.15);
    margin-bottom: 0.6rem;
    z-index: 1;
    letter-spacing: 2px;
  }

  .hud {
    display: flex;
    gap: 1.5rem;
    margin-bottom: 0.6rem;
    z-index: 1;
    font-size: 0.9rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 2px 4px rgba(0,0,0,0.2);
  }

  .hud .chip {
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(8px);
    padding: 5px 14px;
    border-radius: 20px;
  }

  canvas {
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    display: block;
    z-index: 1;
  }

  .canvas-wrap { position: relative; z-index: 1; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(135,206,235,0.88);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    border-radius: 16px;
    z-index: 10;
  }

  .overlay h2 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 3px 0 rgba(0,0,0,0.15);
  }

  .overlay p {
    font-size: 0.85rem;
    color: rgba(255,255,255,0.9);
    text-align: center;
    line-height: 1.8;
  }

  .btn {
    background: #fff;
    color: #4a90d9;
    border: none;
    border-radius: 25px;
    padding: 12px 30px;
    font-family: 'Quicksand', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    transition: all 0.15s;
  }
  .btn:hover { background: #4a90d9; color: #fff; transform: translateY(-2px); }
  .btn:active { transform: translateY(2px); box-shadow: 0 2px 0 rgba(0,0,0,0.15); }

  .mobile-btns {
    display: none;
    gap: 0.8rem;
    margin-top: 0.8rem;
    z-index: 1;
  }
  .mob-btn {
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(8px);
    border: none;
    border-radius: 50%;
    width: 56px; height: 56px;
    font-size: 1.4rem;
    cursor: pointer;
    touch-action: manipulation;
    font-weight: 700;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
  }
  .mob-btn:active { background: rgba(255,255,255,0.8); transform: scale(0.95); }

  @media (max-width: 550px) {
    .mobile-btns { display: flex; }
    h1 { font-size: 1.4rem; }
  }
</style>
</head>
<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<a class="back-btn" href="../../index.html">← Grįžti</a>
<h1>🌤 Platformer</h1>

<div class="hud">
  <div class="chip">⭐ <span id="scoreEl">0</span></div>
  <div class="chip">❤️ <span id="livesEl">3</span></div>
  <div class="chip">🏆 <span id="levelEl">1</span> lygis</div>
</div>

<div class="canvas-wrap">
  <canvas id="c" width="480" height="400"></canvas>
  <div class="overlay" id="overlay">
    <h2>🌤 Platformer</h2>
    <p>← → judėti &nbsp;|&nbsp; ↑ arba SPACE šokti<br>Rink žvaigždes ir pasiekk vėliavą!</p>
    <button class="btn" onclick="startGame()">▶ Pradėti</button>
  </div>
</div>

<div class="mobile-btns">
  <button class="mob-btn" onpointerdown="keys.left=true" onpointerup="keys.left=false">◀</button>
  <button class="mob-btn" onpointerdown="keys.jump=true" onpointerup="keys.jump=false">↑</button>
  <button class="mob-btn" onpointerdown="keys.right=true" onpointerup="keys.right=false">▶</button>
</div>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

const keys = { left:false, right:false, jump:false };
let player, platforms, stars, flag, score, lives, level, running, frame, camX;
let particles = [];
let jumpPressed = false;

document.addEventListener('keydown', e => {
  if (e.key==='ArrowLeft') keys.left=true;
  if (e.key==='ArrowRight') keys.right=true;
  if ((e.key==='ArrowUp'||e.key===' ')&&!jumpPressed) { keys.jump=true; jumpPressed=true; }
  if (e.key===' ') e.preventDefault();
});
document.addEventListener('keyup', e => {
  if (e.key==='ArrowLeft') keys.left=false;
  if (e.key==='ArrowRight') keys.right=false;
  if (e.key==='ArrowUp'||e.key===' ') { keys.jump=false; jumpPressed=false; }
});

// Cute color palette
const SKY_COLORS = [
  ['#87CEEB','#b8e4f7'],
  ['#FFB6C1','#ffd6dc'],
  ['#98FB98','#c8ffc8'],
];

const PLATFORM_COLORS = [
  ['#6dbf6d','#4a9e4a','#8fdf8f'],
  ['#d4956b','#b87040','#edb88b'],
  ['#7b9ed9','#4a75c4','#a5c0f0'],
];

function buildLevel(lvl) {
  const idx = (lvl-1) % 3;
  const pw = 3000;

  const plats = [
    { x:0, y:350, w:200, h:20 },
    { x:250, y:300, w:120, h:20 },
    { x:430, y:250, w:100, h:20 },
    { x:580, y:300, w:130, h:20 },
    { x:760, y:240, w:110, h:20 },
    { x:920, y:280, w:150, h:20 },
    { x:1120, y:220, w:100, h:20 },
    { x:1270, y:260, w:130, h:20 },
    { x:1450, y:200, w:120, h:20 },
    { x:1620, y:250, w:140, h:20 },
    { x:1820, y:180, w:110, h:20 },
    { x:1990, y:230, w:130, h:20 },
    { x:2180, y:170, w:120, h:20 },
    { x:2350, y:220, w:140, h:20 },
    { x:2550, y:160, w:110, h:20 },
    { x:2700, y:200, w:160, h:20 },
    { x:2900, y:320, w:200, h:20 }, // final
  ];

  const strs = [];
  plats.forEach((p,i) => {
    if (i>0) strs.push({ x: p.x + p.w/2, y: p.y-30, collected:false });
  });

  return {
    platforms: plats,
    stars: strs,
    flag: { x: 3050, y: 220, w: 30, h: 80 },
    colors: PLATFORM_COLORS[idx],
    sky: SKY_COLORS[idx],
    worldW: pw,
  };
}

function startGame(newLevel=1) {
  document.getElementById('overlay').style.display = 'none';
  if (newLevel===1) { score=0; lives=3; level=1; }
  const lvl = buildLevel(level);
  platforms = lvl.platforms;
  stars = lvl.stars;
  flag = lvl.flag;
  window._lvlColors = lvl.colors;
  window._skyColors = lvl.sky;
  window._worldW = lvl.worldW;

  player = {
    x: 60, y: 280,
    w: 28, h: 32,
    vx: 0, vy: 0,
    onGround: false,
    jumping: false,
    facing: 1,
    frame: 0,
    dead: false,
  };
  camX = 0;
  running = true;
  frame = 0;
  particles = [];

  document.getElementById('scoreEl').textContent = score;
  document.getElementById('livesEl').textContent = lives;
  document.getElementById('levelEl').textContent = level;

  if (window._gl) cancelAnimationFrame(window._gl);
  loop();
}

function spawnStars(x, y, color) {
  for (let i=0; i<12; i++) {
    const angle = (i/12)*Math.PI*2;
    particles.push({
      x, y, vx: Math.cos(angle)*3, vy: Math.sin(angle)*3-1,
      r: 4+Math.random()*4, color,
      life: 30, maxLife: 30, type:'star'
    });
  }
}

function spawnDust(x, y) {
  for (let i=0; i<6; i++) {
    particles.push({
      x, y, vx: (Math.random()-0.5)*3, vy: -Math.random()*2,
      r: 3+Math.random()*4, color:'rgba(255,255,255,0.7)',
      life: 20, maxLife: 20, type:'dust'
    });
  }
}

function drawBackground(sky) {
  const grad = ctx.createLinearGradient(0,0,0,H);
  grad.addColorStop(0, sky[0]);
  grad.addColorStop(1, sky[1]);
  ctx.fillStyle = grad;
  ctx.fillRect(0,0,W,H);

  // Distant hills
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  for (let i=0; i<5; i++) {
    const hx = (i*320 - camX*0.2) % (W+200) - 100;
    ctx.beginPath();
    ctx.arc(hx, H-60, 120, Math.PI, 0);
    ctx.fill();
  }
}

function drawPlatform(p, colors) {
  const sx = p.x - camX;
  if (sx > W+50 || sx+p.w < -50) return;

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath();
  ctx.roundRect(sx+4, p.y+6, p.w, p.h, 8);
  ctx.fill();

  // Main body
  ctx.fillStyle = colors[0];
  ctx.beginPath();
  ctx.roundRect(sx, p.y, p.w, p.h, 8);
  ctx.fill();

  // Top grass strip
  ctx.fillStyle = colors[2];
  ctx.beginPath();
  ctx.roundRect(sx, p.y, p.w, 8, [8,8,0,0]);
  ctx.fill();

  // Grass tufts
  ctx.fillStyle = colors[2];
  for (let g=0; g<Math.floor(p.w/20); g++) {
    const gx = sx + 6 + g*20;
    ctx.beginPath();
    ctx.arc(gx, p.y, 5, Math.PI, 0);
    ctx.fill();
  }
}

function drawStar(s) {
  if (s.collected) return;
  const sx = s.x - camX;
  if (sx < -20 || sx > W+20) return;

  const bob = Math.sin(frame*0.08 + s.x) * 3;

  ctx.save();
  ctx.translate(sx, s.y + bob);

  // Glow
  ctx.shadowBlur = 12;
  ctx.shadowColor = '#FFD700';

  // Star shape
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  for (let i=0; i<5; i++) {
    const a = (i*4*Math.PI/5) - Math.PI/2;
    const ia = a + Math.PI/5;
    if (i===0) ctx.moveTo(Math.cos(a)*12, Math.sin(a)*12);
    else ctx.lineTo(Math.cos(a)*12, Math.sin(a)*12);
    ctx.lineTo(Math.cos(ia)*5, Math.sin(ia)*5);
  }
  ctx.closePath();
  ctx.fill();

  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawFlag() {
  const sx = flag.x - camX;
  if (sx < -50 || sx > W+50) return;

  // Pole
  ctx.fillStyle = '#ccc';
  ctx.fillRect(sx, flag.y, 4, flag.h);

  // Flag waving
  const wave = Math.sin(frame*0.1)*5;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(sx+4, flag.y);
  ctx.lineTo(sx+34+wave, flag.y+10);
  ctx.lineTo(sx+4, flag.y+22);
  ctx.closePath();
  ctx.fill();

  // Base
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.roundRect(sx-8, flag.y+flag.h-6, 20, 8, 4);
  ctx.fill();
}

function drawPlayer(p) {
  const sx = p.x - camX;
  ctx.save();
  ctx.translate(sx + p.w/2, p.y + p.h/2);
  if (p.facing < 0) ctx.scale(-1, 1);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.15)';
  ctx.beginPath();
  ctx.ellipse(0, p.h/2+2, p.w/2, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#4a90d9';
  ctx.beginPath();
  ctx.roundRect(-p.w/2, -p.h/2+8, p.w, p.h-8, [6,6,8,8]);
  ctx.fill();

  // Head
  ctx.fillStyle = '#ffcc99';
  ctx.beginPath();
  ctx.arc(0, -p.h/2+6, 12, 0, Math.PI*2);
  ctx.fill();

  // Hat
  ctx.fillStyle = '#e03030';
  ctx.beginPath();
  ctx.roundRect(-10, -p.h/2-6, 20, 10, 4);
  ctx.fill();
  ctx.fillRect(-13, -p.h/2+2, 26, 4);

  // Eyes
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(4, -p.h/2+5, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(5, -p.h/2+4, 1, 0, Math.PI*2); ctx.fill();

  // Legs (animated)
  const legSwing = p.onGround ? Math.sin(frame*0.25)*12 : 0;
  ctx.fillStyle = '#2c5f8a';
  ctx.beginPath(); ctx.roundRect(-8, p.h/2-14, 7, 14, 4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1, p.h/2-14, 7, 14, 4); ctx.fill();

  // Shoes
  ctx.fillStyle = '#8B4513';
  ctx.beginPath(); ctx.roundRect(-10, p.h/2-4, 10, 6, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(0, p.h/2-4, 10, 6, 3); ctx.fill();

  ctx.restore();
}

function drawParticles() {
  particles.forEach((p,i) => {
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle = p.color;
    if (p.type==='star') {
      ctx.beginPath();
      ctx.arc(p.x-camX, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    } else {
      ctx.beginPath();
      ctx.arc(p.x-camX, p.y, p.r, 0, Math.PI*2);
      ctx.fill();
    }
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.15; p.r*=0.94; p.life--;
    if (p.life<=0) particles.splice(i,1);
  });
  ctx.globalAlpha = 1;
}

function physics() {
  // Gravity
  player.vy += 0.5;

  // Move
  if (keys.left)  { player.vx = -3.5; player.facing=-1; }
  else if (keys.right) { player.vx = 3.5; player.facing=1; }
  else player.vx *= 0.8;

  // Jump
  if (keys.jump && player.onGround) {
    player.vy = -11;
    player.onGround = false;
    spawnDust(player.x+player.w/2, player.y+player.h);
  }

  player.x += player.vx;
  player.y += player.vy;
  player.onGround = false;

  // Platform collisions
  platforms.forEach(p => {
    if (player.x+player.w > p.x && player.x < p.x+p.w &&
        player.y+player.h > p.y && player.y+player.h < p.y+p.h+player.vy+2 &&
        player.vy >= 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // Star collection
  stars.forEach(s => {
    if (!s.collected &&
        Math.abs((player.x+player.w/2)-s.x) < 22 &&
        Math.abs((player.y+player.h/2)-s.y) < 22) {
      s.collected = true;
      score += 10;
      document.getElementById('scoreEl').textContent = score;
      spawnStars(s.x, s.y, '#FFD700');
    }
  });

  // Flag
  if (player.x+player.w > flag.x && player.x < flag.x+flag.w &&
      player.y+player.h > flag.y && player.y < flag.y+flag.h) {
    levelComplete();
    return;
  }

  // Fall off
  if (player.y > H+100) {
    lives--;
    document.getElementById('livesEl').textContent = lives;
    if (lives<=0) { endGame(); return; }
    player.x=60; player.y=280; player.vx=0; player.vy=0; camX=0;
  }

  // Camera
  const target = player.x - W/3;
  camX += (target - camX) * 0.1;
  camX = Math.max(0, Math.min(camX, window._worldW - W));

  frame++;
}

function loop() {
  if (!running) return;
  physics();

  // Draw
  drawBackground(window._skyColors || ['#87CEEB','#b8e4f7']);
  platforms.forEach(p => drawPlatform(p, window._lvlColors));
  drawFlag();
  stars.forEach(s => drawStar(s));
  drawParticles();
  drawPlayer(player);

  window._gl = requestAnimationFrame(loop);
}

function levelComplete() {
  running = false;
  const allStars = stars.filter(s=>s.collected).length;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h2>🎉 Lygis įveiktas!</h2>
    <p>Surinkta žvaigždžių: ⭐ ${allStars}/${stars.length}<br>Taškai: ${score}</p>
    <button class="btn" onclick="level++; startGame(level)">Kitas lygis →</button>
  `;
  ov.style.display = 'flex';
}

function endGame() {
  running = false;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h2>💔 Žaidimas baigtas</h2>
    <p>Taškai: ⭐ ${score}</p>
    <button class="btn" onclick="startGame(1)">🔄 Iš naujo</button>
  `;
  ov.style.display = 'flex';
}

drawBackground(['#87CEEB','#b8e4f7']);
</script>
</body>
</html>
