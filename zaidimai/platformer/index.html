<!DOCTYPE html>
<html lang="lt">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Platformer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Quicksand:wght@400;700&display=swap');

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: #87CEEB;
    font-family: 'Quicksand', sans-serif;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    overflow: hidden;
  }

  .cloud {
    position: fixed;
    background: white;
    border-radius: 50px;
    opacity: 0.8;
    pointer-events: none;
  }
  .cloud::before, .cloud::after {
    content: '';
    position: absolute;
    background: white;
    border-radius: 50%;
  }
  .c1 { width:120px; height:40px; top:8%; left:-10%; animation: cloudMove 20s linear infinite; }
  .c1::before { width:60px; height:60px; top:-30px; left:15px; }
  .c1::after  { width:40px; height:40px; top:-20px; left:55px; }
  .c2 { width:80px; height:30px; top:20%; left:-5%; animation: cloudMove 28s linear infinite 5s; }
  .c2::before { width:40px; height:40px; top:-20px; left:10px; }
  .c2::after  { width:30px; height:30px; top:-15px; left:38px; }
  .c3 { width:100px; height:35px; top:5%; left:-8%; animation: cloudMove 24s linear infinite 12s; }
  .c3::before { width:50px; height:50px; top:-25px; left:12px; }
  .c3::after  { width:35px; height:35px; top:-18px; left:48px; }

  @keyframes cloudMove {
    from { left: -150px; }
    to   { left: 110%; }
  }

  a.back-btn {
    position: fixed;
    top: 14px; left: 14px;
    background: #fff;
    color: #4a90d9;
    padding: 7px 14px;
    border-radius: 20px;
    text-decoration: none;
    font-size: 13px;
    font-weight: 700;
    box-shadow: 0 3px 10px rgba(0,0,0,0.15);
    z-index: 100;
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 3px 0 rgba(0,0,0,0.15);
    margin-bottom: 0.6rem;
    z-index: 1;
  }

  .hud {
    display: flex;
    gap: 1rem;
    margin-bottom: 0.6rem;
    z-index: 1;
    font-size: 0.85rem;
    font-weight: 700;
    color: #fff;
  }

  .hud .chip {
    background: rgba(255,255,255,0.4);
    backdrop-filter: blur(8px);
    padding: 5px 14px;
    border-radius: 20px;
  }

  canvas {
    border-radius: 16px;
    box-shadow: 0 8px 40px rgba(0,0,0,0.25);
    display: block;
    z-index: 1;
    max-width: 100vw;
  }

  .canvas-wrap { position: relative; z-index: 1; }

  .overlay {
    position: absolute;
    inset: 0;
    background: rgba(135,206,235,0.9);
    backdrop-filter: blur(6px);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    border-radius: 16px;
    z-index: 10;
  }

  .overlay h2 {
    font-size: 1.4rem;
    font-weight: 700;
    color: #fff;
    text-shadow: 0 3px 0 rgba(0,0,0,0.15);
  }

  .overlay p {
    font-size: 0.8rem;
    color: rgba(255,255,255,0.95);
    text-align: center;
    line-height: 2;
  }

  .btn {
    background: #fff;
    color: #4a90d9;
    border: none;
    border-radius: 25px;
    padding: 12px 30px;
    font-family: 'Quicksand', sans-serif;
    font-size: 1rem;
    font-weight: 700;
    cursor: pointer;
    box-shadow: 0 4px 0 rgba(0,0,0,0.15);
    transition: all 0.15s;
  }
  .btn:hover { background: #4a90d9; color: #fff; }

  /* Single jump button */
  .jump-btn {
    margin-top: 0.8rem;
    z-index: 1;
    background: rgba(255,255,255,0.5);
    backdrop-filter: blur(8px);
    border: none;
    border-radius: 50%;
    width: 70px; height: 70px;
    font-size: 1.8rem;
    cursor: pointer;
    touch-action: manipulation;
    box-shadow: 0 4px 0 rgba(0,0,0,0.1);
  }
  .jump-btn:active { transform: scale(0.93); background: rgba(255,255,255,0.8); }
</style>
</head>
<body>

<div class="cloud c1"></div>
<div class="cloud c2"></div>
<div class="cloud c3"></div>

<a class="back-btn" href="../../index.html">← Grįžti</a>
<h1>🌤 Platformer</h1>

<div class="hud">
  <div class="chip">⭐ <span id="scoreEl">0</span></div>
  <div class="chip">❤️ <span id="livesEl">3</span></div>
  <div class="chip">🏆 <span id="levelEl">1</span></div>
</div>

<div class="canvas-wrap">
  <canvas id="c" width="480" height="380"></canvas>
  <div class="overlay" id="overlay">
    <h2>🌤 Platformer</h2>
    <p>Veikėjas juda automatiškai!<br>
    ↑ SPACE arba mygtukas apačioje — šokti<br>
    Rink žvaigždes, pasiekk vėliavą!</p>
    <button class="btn" onclick="startGame()">▶ Pradėti</button>
  </div>
</div>

<!-- Single jump button for mobile -->
<button class="jump-btn" id="jumpBtn">↑</button>

<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// Jump button
const jumpBtn = document.getElementById('jumpBtn');
jumpBtn.addEventListener('pointerdown', () => { doJump(); });

// Keyboard
document.addEventListener('keydown', e => {
  if (e.key==='ArrowUp' || e.key===' ') { e.preventDefault(); doJump(); }
});

// Tap on canvas = jump
canvas.addEventListener('pointerdown', () => doJump());

function doJump() {
  if (!running) return;
  if (player.onGround) {
    player.vy = -12;
    player.onGround = false;
    spawnDust(player.x + player.w/2, player.y + player.h);
  }
}

let player, platforms, stars, flag, score, lives, level, running, frame, camX;
let particles = [];

const PLATFORM_COLORS = [
  ['#6dbf6d','#4a9e4a','#8fdf8f'],
  ['#d4956b','#b87040','#edb88b'],
  ['#7b9ed9','#4a75c4','#a5c0f0'],
];
const SKY_COLORS = [
  ['#87CEEB','#b8e4f7'],
  ['#FFB6C1','#ffd6dc'],
  ['#c8b4f0','#e0d4ff'],
];

function buildLevel(lvl) {
  const idx = (lvl-1) % 3;
  const plats = [
    { x:0,    y:330, w:220, h:20 },
    { x:260,  y:280, w:120, h:20 },
    { x:430,  y:230, w:110, h:20 },
    { x:590,  y:270, w:130, h:20 },
    { x:770,  y:210, w:120, h:20 },
    { x:940,  y:250, w:140, h:20 },
    { x:1130, y:190, w:110, h:20 },
    { x:1290, y:240, w:130, h:20 },
    { x:1470, y:180, w:120, h:20 },
    { x:1640, y:220, w:140, h:20 },
    { x:1830, y:160, w:120, h:20 },
    { x:2010, y:210, w:140, h:20 },
    { x:2200, y:150, w:120, h:20 },
    { x:2380, y:200, w:150, h:20 },
    { x:2580, y:280, w:200, h:20 },
  ];

  const strs = [];
  plats.forEach((p, i) => {
    if (i > 0) strs.push({ x: p.x + p.w/2, y: p.y - 35, collected: false });
  });

  return {
    platforms: plats,
    stars: strs,
    flag: { x: 2730, y: 190, w: 30, h: 90 },
    colors: PLATFORM_COLORS[idx],
    sky: SKY_COLORS[idx],
    worldW: 2900,
  };
}

function startGame(newLevel=1) {
  document.getElementById('overlay').style.display = 'none';
  if (newLevel===1) { score=0; lives=3; level=1; }
  const lvl = buildLevel(level);
  platforms = lvl.platforms;
  stars = lvl.stars;
  flag = lvl.flag;
  window._lc = lvl.colors;
  window._sky = lvl.sky;
  window._wW = lvl.worldW;

  player = {
    x: 50, y: 270,
    w: 28, h: 34,
    vx: 2.2, // auto move right
    vy: 0,
    onGround: false,
    facing: 1,
  };

  camX = 0; frame = 0; running = true; particles = [];
  document.getElementById('scoreEl').textContent = score;
  document.getElementById('livesEl').textContent = lives;
  document.getElementById('levelEl').textContent = level;

  if (window._gl) cancelAnimationFrame(window._gl);
  loop();
}

function spawnDust(x, y) {
  for (let i=0; i<6; i++) {
    particles.push({
      x, y, vx:(Math.random()-0.5)*3, vy:-Math.random()*2,
      r:3+Math.random()*3, color:'rgba(255,255,255,0.8)',
      life:18, maxLife:18
    });
  }
}

function spawnStarBurst(x, y) {
  for (let i=0; i<14; i++) {
    const a = (i/14)*Math.PI*2;
    particles.push({
      x, y, vx:Math.cos(a)*3.5, vy:Math.sin(a)*3.5-1,
      r:4+Math.random()*3, color:'#FFD700',
      life:28, maxLife:28
    });
  }
}

function drawBg() {
  const sky = window._sky || ['#87CEEB','#b8e4f7'];
  const g = ctx.createLinearGradient(0,0,0,H);
  g.addColorStop(0, sky[0]);
  g.addColorStop(1, sky[1]);
  ctx.fillStyle = g;
  ctx.fillRect(0,0,W,H);

  // Hills
  ctx.fillStyle = 'rgba(255,255,255,0.12)';
  for (let i=0; i<6; i++) {
    const hx = ((i*300 - camX*0.15) % (W+300)) - 100;
    ctx.beginPath();
    ctx.arc(hx, H-40, 130, Math.PI, 0);
    ctx.fill();
  }
}

function drawPlat(p) {
  const c = window._lc || PLATFORM_COLORS[0];
  const sx = p.x - camX;
  if (sx > W+60 || sx+p.w < -60) return;

  ctx.fillStyle = 'rgba(0,0,0,0.1)';
  ctx.beginPath(); ctx.roundRect(sx+4, p.y+6, p.w, p.h, 8); ctx.fill();

  ctx.fillStyle = c[0];
  ctx.beginPath(); ctx.roundRect(sx, p.y, p.w, p.h, 8); ctx.fill();

  ctx.fillStyle = c[2];
  ctx.beginPath(); ctx.roundRect(sx, p.y, p.w, 8, [8,8,0,0]); ctx.fill();

  for (let g=0; g<Math.floor(p.w/18); g++) {
    ctx.beginPath();
    ctx.arc(sx+6+g*18, p.y, 5, Math.PI, 0);
    ctx.fill();
  }
}

function drawStar(s) {
  if (s.collected) return;
  const sx = s.x - camX;
  if (sx < -30 || sx > W+30) return;
  const bob = Math.sin(frame*0.08 + s.x*0.01) * 3;
  ctx.save();
  ctx.translate(sx, s.y + bob);
  ctx.shadowBlur = 14; ctx.shadowColor = '#FFD700';
  ctx.fillStyle = '#FFD700';
  ctx.beginPath();
  for (let i=0; i<5; i++) {
    const a = (i*4*Math.PI/5)-Math.PI/2;
    const ia = a+Math.PI/5;
    if (i===0) ctx.moveTo(Math.cos(a)*11, Math.sin(a)*11);
    else ctx.lineTo(Math.cos(a)*11, Math.sin(a)*11);
    ctx.lineTo(Math.cos(ia)*5, Math.sin(ia)*5);
  }
  ctx.closePath(); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
}

function drawFlag() {
  const sx = flag.x - camX;
  if (sx < -60 || sx > W+60) return;
  ctx.fillStyle = '#bbb';
  ctx.fillRect(sx, flag.y, 4, flag.h);
  const wave = Math.sin(frame*0.12)*6;
  ctx.fillStyle = '#ff4444';
  ctx.beginPath();
  ctx.moveTo(sx+4, flag.y);
  ctx.lineTo(sx+36+wave, flag.y+11);
  ctx.lineTo(sx+4, flag.y+24);
  ctx.closePath(); ctx.fill();
  ctx.fillStyle = '#888';
  ctx.beginPath();
  ctx.roundRect(sx-8, flag.y+flag.h-5, 22, 8, 4);
  ctx.fill();
}

function drawPlayer() {
  const p = player;
  const sx = p.x - camX;
  ctx.save();
  ctx.translate(sx + p.w/2, p.y + p.h/2);
  if (p.facing < 0) ctx.scale(-1,1);

  // Shadow
  ctx.fillStyle = 'rgba(0,0,0,0.12)';
  ctx.beginPath();
  ctx.ellipse(0, p.h/2+2, p.w/2, 5, 0, 0, Math.PI*2);
  ctx.fill();

  // Body
  ctx.fillStyle = '#4a90d9';
  ctx.beginPath(); ctx.roundRect(-p.w/2, -p.h/2+10, p.w, p.h-10, [6,6,8,8]); ctx.fill();

  // Head
  ctx.fillStyle = '#ffcc99';
  ctx.beginPath(); ctx.arc(0, -p.h/2+7, 12, 0, Math.PI*2); ctx.fill();

  // Hat
  ctx.fillStyle = '#e03030';
  ctx.beginPath(); ctx.roundRect(-10, -p.h/2-5, 20, 10, 4); ctx.fill();
  ctx.fillRect(-13, -p.h/2+3, 26, 4);

  // Eye
  ctx.fillStyle = '#333';
  ctx.beginPath(); ctx.arc(4, -p.h/2+6, 2.5, 0, Math.PI*2); ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(5, -p.h/2+5, 1, 0, Math.PI*2); ctx.fill();

  // Legs animated
  const ls = p.onGround ? Math.sin(frame*0.3)*8 : 0;
  ctx.fillStyle = '#2c5f8a';
  ctx.beginPath(); ctx.roundRect(-8+ls/2, p.h/2-14, 7, 14, 4); ctx.fill();
  ctx.beginPath(); ctx.roundRect(1-ls/2, p.h/2-14, 7, 14, 4); ctx.fill();

  // Shoes
  ctx.fillStyle = '#8B4513';
  ctx.beginPath(); ctx.roundRect(-10+ls/2, p.h/2-3, 10, 5, 3); ctx.fill();
  ctx.beginPath(); ctx.roundRect(0-ls/2, p.h/2-3, 10, 5, 3); ctx.fill();

  ctx.restore();
}

function drawParticles() {
  particles.forEach((p,i) => {
    ctx.globalAlpha = p.life/p.maxLife;
    ctx.fillStyle = p.color;
    ctx.beginPath();
    ctx.arc(p.x - camX, p.y, p.r, 0, Math.PI*2);
    ctx.fill();
    p.x+=p.vx; p.y+=p.vy; p.vy+=0.12; p.r*=0.95; p.life--;
    if (p.life<=0) particles.splice(i,1);
  });
  ctx.globalAlpha = 1;
}

function physics() {
  // Auto move right always
  player.vx = 2.2;
  player.x += player.vx;

  // Gravity
  player.vy += 0.55;
  player.y += player.vy;
  player.onGround = false;

  // Platform collision
  platforms.forEach(p => {
    if (player.x + player.w > p.x && player.x < p.x + p.w &&
        player.y + player.h > p.y && player.y + player.h < p.y + p.h + Math.abs(player.vy) + 2 &&
        player.vy >= 0) {
      player.y = p.y - player.h;
      player.vy = 0;
      player.onGround = true;
    }
  });

  // Stars
  stars.forEach(s => {
    if (!s.collected &&
        Math.abs(player.x + player.w/2 - s.x) < 24 &&
        Math.abs(player.y + player.h/2 - s.y) < 24) {
      s.collected = true;
      score += 10;
      document.getElementById('scoreEl').textContent = score;
      spawnStarBurst(s.x, s.y);
    }
  });

  // Flag
  if (player.x + player.w > flag.x && player.x < flag.x + flag.w &&
      player.y + player.h > flag.y && player.y < flag.y + flag.h) {
    levelComplete(); return;
  }

  // Fall = lose life
  if (player.y > H + 80) {
    lives--;
    document.getElementById('livesEl').textContent = lives;
    if (lives <= 0) { endGame(); return; }
    // Restart from beginning of level
    player.x = 50; player.y = 270;
    player.vx = 2.2; player.vy = 0;
    camX = 0;
  }

  // Camera follows player
  const target = player.x - W/3;
  camX += (target - camX) * 0.12;
  camX = Math.max(0, Math.min(camX, window._wW - W));

  frame++;
}

function loop() {
  if (!running) return;
  physics();
  drawBg();
  platforms.forEach(p => drawPlat(p));
  drawFlag();
  stars.forEach(s => drawStar(s));
  drawParticles();
  drawPlayer();
  window._gl = requestAnimationFrame(loop);
}

function levelComplete() {
  running = false;
  const got = stars.filter(s=>s.collected).length;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h2>🎉 Lygis įveiktas!</h2>
    <p>⭐ ${got}/${stars.length} žvaigždės<br>Taškai: ${score}</p>
    <button class="btn" onclick="level++; startGame(level)">Kitas lygis →</button>
  `;
  ov.style.display = 'flex';
}

function endGame() {
  running = false;
  const ov = document.getElementById('overlay');
  ov.innerHTML = `
    <h2>💔 Žaidimas baigtas</h2>
    <p>Taškai: ${score}</p>
    <button class="btn" onclick="startGame(1)">🔄 Iš naujo</button>
  `;
  ov.style.display = 'flex';
}

drawBg();
</script>
</body>
</html>
